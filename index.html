   const palette = ["#e3f2fd", "#f1f8e9", "#fff3e0", "#f3e5f5", "#e0f2f1", "#e8eaf6", "#eeeeee", "#fce4ec", "#f9fbe7", "#efebe9"];

    let currentGroups = []; 
    let isCommonOnlyMode = false;

    const naturalSort = (a, b) => a.localeCompare(b, undefined, { numeric: true });

    // 核心邏輯：將輸入的數字字串與編號的「核心區段」進行比對
    function checkPositionalMatch(fullID, queryStr) {
        const parts = fullID.split('-');
        if (parts.length < 3) return false;

        // 提取核心區段：第二區塊(0458)與第三區塊(02)
        const coreID = (parts[1] + parts[2]).replace(/\D/g, ''); 
        
        // 處理輸入：移除所有非數字
        let cleanQuery = queryStr.replace(/\D/g, '');

        // 自動校準補零 (針對 45802 -> 045802)
        if (cleanQuery.length === 5) {
            cleanQuery = "0" + cleanQuery;
        }

        // 執行精確核心比對
        return coreID === cleanQuery;
    }

    function getBaseID(fullID) {
        const parts = fullID.split('-');
        return parts.length > 3 ? parts.slice(0, 3).join('-') : fullID;
    }

    function formatCode(codeStr) {
        let clean = codeStr.replace(/^0+/, '');
        if (clean === "" || /^[a-zA-Z]/.test(clean)) return clean || "0";
        let match = clean.match(/^(\d+)(.*)$/);
        return match ? match[1].padStart(2, '0') + match[2] : clean;
    }

    function runFuzzyQuery() {
        const input = document.getElementById('inputSearch').value.trim();
        const keywords = input.split(/[\s,]+/).filter(k => k !== "");
        if (keywords.length === 0) return;

        isCommonOnlyMode = false;
        
        const matchedIDs = Object.keys(rawData).filter(key => {
            return keywords.some(kw => checkPositionalMatch(key, kw));
        });

        const groups = {};
        matchedIDs.forEach(id => {
            const base = getBaseID(id);
            const content = rawData[id];
            const groupKey = `${base}|${content}`;
            if (!groups[groupKey]) {
                groups[groupKey] = { id: groupKey, base: base, displayName: "", members: [], content: content };
            }
            groups[groupKey].members.push(id);
        });

        currentGroups = Object.values(groups).map((g, i) => ({
            ...g,
            color: palette[i % palette.length],
            displayName: g.members.length > 1 ? `${g.base}-XX` : g.members[0]
        }));

        updateUI();
    }

    function removeGroup(groupId, event) {
        event.stopPropagation();
        currentGroups = currentGroups.filter(g => g.id !== groupId);
        updateUI();
    }

    function toggleCommonOnly() {
        isCommonOnlyMode = !isCommonOnlyMode;
        document.getElementById('btnOnlyCommon').innerText = isCommonOnlyMode ? "顯示全部料件" : "僅顯示共用料";
        updateUI();
    }

    function updateUI() {
        document.getElementById('btnOnlyCommon').style.display = currentGroups.length > 1 ? 'inline-block' : 'none';
        renderView(currentGroups);
    }

    function renderView(displayGroups) {
        const statusDiv = document.getElementById('matchStatus');
        const resultDiv = document.getElementById('resultArea');
        if (currentGroups.length === 0) {
            statusDiv.innerText = "查無此核心編號。";
            resultDiv.innerHTML = "";
            return;
        }

        let statusHtml = "母件：";
        currentGroups.forEach(g => {
            const isSelected = displayGroups.length === 1 && displayGroups[0] === g;
            statusHtml += `<span class="parent-tag" style="background-color: ${g.color}; border: ${isSelected ? '2px solid #333' : '1px solid #ccc'}" onclick="filterGroup('${g.id}')">${g.displayName}<span class="del-btn" onclick="removeGroup('${g.id}', event)">×</span></span>`;
        });
        
        if (displayGroups.length < currentGroups.length) {
            statusHtml += `<button class="reset-btn" onclick="isCommonOnlyMode=false;updateUI()">恢復清單</button>`;
        }
        statusDiv.innerHTML = statusHtml;

        const masterMap = {};
        displayGroups.forEach(g => {
            g.content.split(',').forEach(fullStr => {
                const [prefix, ...rest] = fullStr.split('-');
                const code = formatCode(rest.join('-'));
                if (!masterMap[prefix]) masterMap[prefix] = {};
                if (!masterMap[prefix][code]) masterMap[prefix][code] = [];
                masterMap[prefix][code].push(g);
            });
        });

        let html = `<table><thead><tr><th>類別</th><th>子件明細</th></tr></thead><tbody>`;
        Object.keys(masterMap).sort().forEach(pre => {
            const codesObj = masterMap[pre];
            const sortedCodes = Object.keys(codesObj).sort(naturalSort);
            let codeHtmlList = sortedCodes.map(c => {
                const owners = codesObj[c];
                const isCommon = displayGroups.length > 1 && owners.length === displayGroups.length;
                return isCommon ? `<span class="child-item common-part">${c}</span>` : (!isCommonOnlyMode ? `<span class="child-item" style="background-color: ${owners[0].color}">${c}</span>` : '');
            }).filter(h => h !== '');
            if (codeHtmlList.length > 0) html += `<tr><td class="prefix-td">${pre}</td><td>${codeHtmlList.join('')}</td></tr>`;
        });
        resultDiv.innerHTML = html + `</tbody></table>`;
    }

    function filterGroup(groupId) {
        isCommonOnlyMode = false;
        const target = currentGroups.find(g => g.id === groupId);
        if (target) renderView([target]);
    }
